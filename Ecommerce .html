<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple eCommerce</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
    }

    header {
      background: #333;
      color: #fff;
      padding: 15px;
      text-align: center;
    }

    .container {
      display: flex;
      padding: 20px;
    }

    .products {
      flex: 3;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .product {
      background: white;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .product img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    button {
      background: #28a745;
      color: white;
      border: none;
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: #218838;
    }

    .cart {
      flex: 1;
      background: white;
      margin-left: 20px;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .cart h2 {
      margin-top: 0;
    }

    .cart-item {
      border-bottom: 1px solid #ccc;
      padding: 5px 0;
    }
  </style>
</head>
<body>

<header>
  <h1>🛍️ My eCommerce Store</h1>
</header>

<div class="container">
  <div class="products" id="productList"></div>

  <div class="cart">
    <h2>Cart</h2>
    <div id="cartItems"></div>
    <h3>Total: ₹<span id="total">0</span></h3>
  </div>
</div>

<script>
  const products = [
    { id: 1, name: "Shoes", price: 1500, image: "https://via.placeholder.com/200" },
    { id: 2, name: "Watch", price: 2500, image: "https://via.placeholder.com/200" },
    { id: 3, name: "Bag", price: 1200, image: "https://via.placeholder.com/200" },
    { id: 4, name: "Headphones", price: 2000, image: "https://via.placeholder.com/200" }
  ];

  let cart = [];

  function displayProducts() {
    const productList = document.getElementById("productList");
    productList.innerHTML = "";

    products.forEach(product => {
      const div = document.createElement("div");
      div.classList.add("product");

      div.innerHTML = `
        <img src="${product.image}" />
        <h3>${product.name}</h3>
        <p>₹${product.price}</p>
        <button onclick="addToCart(${product.id})">Add to Cart</button>
      `;

      productList.appendChild(div);
    });
  }

  function addToCart(id) {
    const product = products.find(p => p.id === id);
    cart.push(product);
    updateCart();
  }

  function updateCart() {
    const cartItems = document.getElementById("cartItems");
    const totalEl = document.getElementById("total");

    cartItems.innerHTML = "";
    let total = 0;

    cart.forEach(item => {
      total += item.price;

      const div = document.createElement("div");
      div.classList.add("cart-item");
      div.textContent = `${item.name} - ₹${item.price}`;

      cartItems.appendChild(div);
    });

    totalEl.textContent = total;
  }

  displayProducts();
</script>

</body>
</html>
